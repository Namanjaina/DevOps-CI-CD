apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-django-app
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app: devops-django-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-django-app
  template:
    metadata:
      labels:
        app: devops-django-app
    spec:
      containers:
        - name: devops-django-app
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
